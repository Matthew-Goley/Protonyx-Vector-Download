<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@600&display=swap" rel="stylesheet">
  <title>Home | Protonyx</title>
</head>
<body>

  <!-- NAV -->
  <nav class="site-nav">
    <div class="logo">
      <img src="assets/company/logo_full.png" alt="Protonyx logo">
    </div>
    <div class="menu-icon">
      <span></span>
      <span></span>
      <span></span>
    </div>
  </nav>

  <!-- HERO -->
  <section id="hero">
    <video autoplay muted playsinline class="hero-video" id="heroVideo" src="assets/video/1vector_demo.mp4"></video>
    
    <div class="hero-content">
      <h1>
        <span>Intelligence,</span><br>
        <span>Engineered.</span>
      </h1>
    </div>

    <div class="scroll-indicator">
      <div class="arrow">↓</div>
      <p>Scroll to Explore</p>
    </div>
  </section>

  <!-- TAGLINE -->
  <section id="about" class="tagline-section">
    <div class="container about-wrap">
      <p class="tagline-text">
        Our systems turn financial data into clear answers, empowering individuals to make smarter investment decisions.
      </p>

      <div class="section-label-row">
        <h2>Our Systems</h2>
      </div>
    </div>
  </section>

  <section class="spacer light-bg"></section>

  <!-- FOOTER -->
  <footer class="footer-light">
    <p>&copy; 2025 Protonyx LLC. All rights reserved.</p>
    <nav class="footer-links">
      <a href="#">Terms of Service</a>
      <a href="#">Privacy Policy</a>
      <a href="#">Contact</a>
    </nav>
  </footer>

  <script src="script.js"></script>
</body>
</html>
