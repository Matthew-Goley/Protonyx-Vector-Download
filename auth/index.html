<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="../assets/product/vector/vector_small.png">
  <link rel="stylesheet" href="../style.css" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@600&display=swap" rel="stylesheet">
  <title>Sign in | Protonyx</title>
</head>
<body class="auth-body">

  <main class="auth-card" role="main">
    <div class="auth-logo-wrap">
      <a href="../index.html" aria-label="Protonyx home">
        <img src="../assets/company/protonyx_full_white.png" alt="Protonyx logo">
      </a>
    </div>

    <div class="auth-beta-status" id="authBetaStatus" aria-live="polite">
      <span class="auth-beta-dot" id="authBetaDot" aria-hidden="true"></span>
      <span id="authBetaText">Checking beta status...</span>
    </div>

    <div class="auth-tabs" role="tablist">
      <button type="button" class="auth-tab active" id="tabLogin" role="tab" aria-selected="true">Sign in</button>
      <button type="button" class="auth-tab" id="tabSignup" role="tab" aria-selected="false">Create account</button>
    </div>

    <form class="auth-form active" id="loginForm" autocomplete="on" novalidate>
      <div class="auth-field">
        <label for="loginUsername">Username or Email</label>
        <input type="text" id="loginUsername" name="username" autocomplete="username" required>
      </div>
      <div class="auth-field">
        <label for="loginPassword">Password</label>
        <input type="password" id="loginPassword" name="password" autocomplete="current-password" required>
      </div>
      <p class="auth-message" id="loginMessage" aria-live="polite"></p>
      <button type="submit" class="auth-submit">Sign in</button>
      <p class="auth-forgot-link">
        <a href="../forgot-password/index.html">Forgot your password?</a>
      </p>
    </form>

    <form class="auth-form" id="signupForm" autocomplete="on" novalidate>
      <div class="auth-field">
        <label for="signupUsername">Username</label>
        <input type="text" id="signupUsername" name="username" autocomplete="username" required>
      </div>
      <div class="auth-field">
        <label for="signupEmail">Email</label>
        <input type="email" id="signupEmail" name="email" autocomplete="email" required>
      </div>
      <div class="auth-field">
        <label for="signupPassword">Password</label>
        <input type="password" id="signupPassword" name="password" autocomplete="new-password" required>
      </div>
      <p class="auth-message" id="signupMessage" aria-live="polite"></p>
      <button type="submit" class="auth-submit">Create account</button>
      <p class="auth-spots-note" id="signupSpots" hidden></p>
      <p class="auth-terms-note">By creating an account, you agree to our <a href="/tos" target="_blank" rel="noopener noreferrer">Terms of Service</a>.</p>
    </form>

    <div class="auth-form auth-beta-full" id="betaFull" role="tabpanel">
      <p>The open beta is currently full. Check back soon.</p>
    </div>

    <p class="auth-footer-link">
      <a href="../index.html">← Back to Home Page</a>
    </p>
  </main>

  <script src="auth.js"></script>
  <script>
    const tabLogin = document.getElementById("tabLogin");
    const tabSignup = document.getElementById("tabSignup");
    const loginForm = document.getElementById("loginForm");
    const signupForm = document.getElementById("signupForm");
    const betaFull = document.getElementById("betaFull");

    // Flipped to true once GET /beta/status confirms the beta is full. While
    // closed, the Create-account tab shows the "beta full" message instead of
    // the signup form. Login is never gated.
    let betaClosed = false;

    function switchToLoginTab() {
      tabLogin.classList.add("active");
      tabLogin.setAttribute("aria-selected", "true");
      tabSignup.classList.remove("active");
      tabSignup.setAttribute("aria-selected", "false");
      loginForm.classList.add("active");
      signupForm.classList.remove("active");
      betaFull.classList.remove("active");
    }

    function switchToSignupTab() {
      tabSignup.classList.add("active");
      tabSignup.setAttribute("aria-selected", "true");
      tabLogin.classList.remove("active");
      tabLogin.setAttribute("aria-selected", "false");
      loginForm.classList.remove("active");
      // When the beta is full, show the message where the signup form would be.
      if (betaClosed) {
        signupForm.classList.remove("active");
        betaFull.classList.add("active");
      } else {
        signupForm.classList.add("active");
        betaFull.classList.remove("active");
      }
    }

    tabLogin.addEventListener("click", switchToLoginTab);
    tabSignup.addEventListener("click", switchToSignupTab);

    loginForm.addEventListener("submit", (e) => {
      e.preventDefault();
      login();
    });

    signupForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      // Capture before signup() runs — it clears the signup username field on success.
      const enteredUsername = document.getElementById("signupUsername").value.trim();
      await signup();
      // On success signup() switches to the login tab; carry the username over.
      if (enteredUsername && loginForm.classList.contains("active")) {
        document.getElementById("loginUsername").value = enteredUsername;
      }
    });

    // Open the Create account tab when linked with ?mode=signup (Create Account links in the navbar + menu).
    if (new URLSearchParams(window.location.search).get("mode") === "signup") {
      switchToSignupTab();
    }

    // Beta status: reflect GET /beta/status in the indicator and gate the signup
    // tab. Fails open (null status leaves the signup form usable and the
    // indicator green) so a backend outage never blocks account creation.
    (async () => {
      const dot = document.getElementById("authBetaDot");
      const text = document.getElementById("authBetaText");
      const spotsNote = document.getElementById("signupSpots");
      const status = await fetchBetaStatus();

      if (status && status.open === false) {
        betaClosed = true;
        if (dot) dot.className = "auth-beta-dot closed";
        if (text) text.textContent = "Beta Full";
        // If the page opened straight to the signup tab, re-render it as the
        // "beta full" message; otherwise stay on login.
        if (tabSignup.classList.contains("active")) {
          switchToSignupTab();
        }
        return;
      }

      // Open, or fail-open on a null status.
      if (dot) dot.className = "auth-beta-dot open";
      if (text) text.textContent = "Open Beta";

      // Subtle urgency only when the count is low enough to matter.
      if (status && typeof status.spots_remaining === "number" &&
          status.spots_remaining <= 20 && spotsNote) {
        const n = status.spots_remaining;
        spotsNote.textContent = n + (n === 1 ? " spot remaining" : " spots remaining");
        spotsNote.hidden = false;
      }
    })();

    checkAuth();
  </script>
</body>
</html>
